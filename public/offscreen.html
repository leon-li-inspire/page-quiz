<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>PageQuiz Offscreen</title>
    </head>
    <body>
        <script type="module">
            console.log("[Offscreen] Document loaded, importing pdf.js...");

            import * as pdfjsLib from "./pdf.min.mjs";
            pdfjsLib.GlobalWorkerOptions.workerSrc = "./pdf.worker.min.mjs";

            console.log(
                "[Offscreen] pdf.js loaded successfully, version:",
                pdfjsLib.version,
            );
            console.log("[Offscreen] Registering message listener...");

            chrome.runtime.onMessage.addListener(
                (message, sender, sendResponse) => {
                    console.log(
                        "[Offscreen] Received message:",
                        JSON.stringify(message).substring(0, 200),
                    );

                    if (message.target !== "offscreen") {
                        console.log(
                            "[Offscreen] Ignoring message (target is not 'offscreen')",
                        );
                        return;
                    }

                    if (message.type === "EXTRACT_PDF_TEXT") {
                        console.log(
                            "[Offscreen] Starting PDF text extraction for:",
                            message.url,
                        );
                        extractPdfText(message.url)
                            .then((text) => {
                                console.log(
                                    "[Offscreen] Extraction complete, text length:",
                                    text.length,
                                );
                                sendResponse({ success: true, text });
                            })
                            .catch((err) => {
                                console.error(
                                    "[Offscreen] Extraction error:",
                                    err.message,
                                );
                                sendResponse({
                                    success: false,
                                    error: err.message,
                                });
                            });
                        return true;
                    }
                },
            );

            console.log("[Offscreen] Message listener registered and ready.");

            async function extractPdfText(url) {
                const cleanUrl = url.split("#")[0];
                console.log("[Offscreen] Fetching PDF from:", cleanUrl);

                const response = await fetch(cleanUrl);
                if (!response.ok) {
                    throw new Error(`Failed to fetch PDF: ${response.status}`);
                }

                const arrayBuffer = await response.arrayBuffer();
                console.log(
                    "[Offscreen] PDF fetched, size:",
                    arrayBuffer.byteLength,
                    "bytes",
                );

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer })
                    .promise;
                console.log("[Offscreen] PDF parsed, pages:", pdf.numPages);

                let fullText = "";
                const maxPages = Math.min(pdf.numPages, 30);
                for (let i = 1; i <= maxPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const pageText = content.items
                        .map((item) => item.str)
                        .join(" ");
                    console.log(
                        "[Offscreen] Page",
                        i,
                        "extracted:",
                        pageText.length,
                        "chars",
                    );
                    fullText += pageText + "\n\n";
                }

                return fullText.trim();
            }
        </script>
    </body>
</html>
